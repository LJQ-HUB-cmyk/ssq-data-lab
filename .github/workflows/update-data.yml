name: Update SSQ Data

on:
  schedule:
    # 北京时间每天 22:30 跑一次（开奖在 21:15 左右，留足缓冲）
    - cron: "30 14 * * 0,2,4"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch latest SSQ draws
        run: python tools/update_ssq.py --count 30

      - name: Commit & push if changed
        shell: bash
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "no changes"
            exit 0
          fi
          issue="$(python -c "import json; d=json.load(open('data/draws.json','r',encoding='utf-8')); print(d['draws'][-1]['issue'])")"
          git config user.name "ssq-data-bot"
          git config user.email "ssq-data-bot@users.noreply.github.com"
          git add data/draws.json data/draws.js
          git commit -m "chore(data): update ssq ${issue}"
          git push
