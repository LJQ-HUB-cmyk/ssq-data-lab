name: Feature request
description: 提一个新功能或改进建议
title: "[feat] "
labels: ["enhancement"]
body:
  - type: textarea
    id: motivation
    attributes:
      label: 你想解决什么问题？
      description: 背景 / 场景 / 用户价值
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 你建议怎么做？
  - type: textarea
    id: alternatives
    attributes:
      label: 有没有考虑过其他方案？
  - type: checkboxes
    id: disclaimer
    attributes:
      label: 确认
      options:
        - label: 我确认这个功能不涉及"预测下一期号码"或引导购彩
          required: true
